name: Build, Sign, and Release
on:
  push:
    branches:
      - '**'
    tags:
      - 'v*'

permissions:
  id-token: write  # Required for Azure OIDC
  contents: write  # Required for GitHub Releases

jobs:
  debug-signing-auth:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Verify Variables
        shell: pwsh
        run: |
          Write-Host "Endpoint: ${{ vars.ARTIFACT_ENDPOINT }}"
          Write-Host "Account: ${{ vars.ARTIFACT_ACCOUNT_NAME }}"
          if ([string]::IsNullOrWhiteSpace("${{ vars.ARTIFACT_ENDPOINT }}")) { 
            Write-Error "Variable is EMPTY! Check GitHub Variables tab."; exit 1 
          }
  build-and-sign:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. Login to Azure first
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            frontend2.1/package-lock.json
            electron2.1/package-lock.json

      # 2. Build the app
      - name: Install All Dependencies
        run: npm run install-all

      - name: Build and Package Windows Installer
        # Move into the folder where the actual Electron code lives
        working-directory: ./electron2.1
        run: |
          npm run build-ui
          npm run build-backend
          npm run build:win --prefix electron2.1 -- --publish never
        env:
          # This ensures electron-builder doesn't hit the 403 error
          # by passing the publish=never flag through the npm script
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ELECTRON_BUILDER_ALLOW_HANDLE_NOT_RELEVANT_TAG: true

      # 3. Setup the Signing Tools
      - name: Download Artifact Signing Client
        shell: pwsh
        run: |
          nuget install Microsoft.ArtifactSigning.Client -OutputDirectory ./signing-tools -ExcludeVersion

      - name: Create Metadata File
        shell: pwsh
        run: |
          # Use Environment Variables to ensure they are being read correctly
          $endpoint = "${{ vars.ARTIFACT_ENDPOINT }}"
          $account = "${{ vars.ARTIFACT_ACCOUNT_NAME }}"
          $profile = "${{ vars.ARTIFACT_PROFILE_NAME }}"

          # Validate that they aren't empty
          if ([string]::IsNullOrWhiteSpace($endpoint)) { Write-Error "❌ ARTIFACT_ENDPOINT variable is missing!"; exit 1 }
          
          $metadata = @{
              Endpoint = $endpoint
              CodeSigningAccountName = $account
              CertificateProfileName = $profile
          }
          
          Write-Host "Constructing metadata for account: $account"
          $metadata | ConvertTo-Json | Out-File -FilePath metadata.json -Encoding utf8
      
      # debugging file locations
      - name: Debug File Locations
        shell: pwsh
        run: |
          Write-Host "Current Directory: $(Get-Location)"
          Write-Host "Checking electron2.1/release folder..."
          Get-ChildItem -Path "electron2.1/release" -Recurse | Select-Object FullName
      # 4. Sign the output files
      - name: Sign Installer
        shell: pwsh
        run: |
          # 1. Find signtool.exe
          $signtool = Get-ChildItem -Path "C:\Program Files (x86)\Windows Kits\10\bin" -Filter signtool.exe -Recurse | Where-Object { $_.FullName -match 'x64' } | Select-Object -First 1 -ExpandProperty FullName
          
          # 2. Dynamically find the DLL inside the signing-tools folder
          # This avoids the "version number in folder name" issue
          $dlibPath = Get-ChildItem -Path "$($env:GITHUB_WORKSPACE)/signing-tools" -Filter "Azure.CodeSigning.Dlib.dll" -Recurse | Select-Object -First 1 -ExpandProperty FullName
          
          if ($null -eq $dlibPath) { 
              Write-Error "❌ Azure.CodeSigning.Dlib.dll NOT found in signing-tools directory"; exit 1 
          } else {
              Write-Host "✅ Found Dlib at: $dlibPath"
          }

          # 3. Path to your installer
          $installerPath = Get-ChildItem -Path "electron2.1/release/*.exe" | Select-Object -First 1 -ExpandProperty FullName
          Write-Host "✅ Found Installer at: $installerPath"

          # 4. Sign the file
          & $signtool sign /v /debug /as /fd SHA256 `
            /tr "http://timestamp.acs.microsoft.com" /td SHA256 `
            /dlib "$dlibPath" `
            /dmdf "metadata.json" `
            "$installerPath"

      # 5. Upload and Release the SIGNED .exe file ONLY
      - name: Upload Signed Installer
        uses: actions/upload-artifact@v4
        with:
          # This name is the folder name inside the GitHub UI; 
          # GitHub will always wrap the artifact in a zip for download here, 
          # but once unzipped, it will contain ONLY the .exe.
          name: NAVFIT26-Windows-Installer
          path: electron2.1/release/*.exe
          if-no-files-found: error

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        # Only runs if you pushed a tag like v1.0.0
        if: startsWith(github.ref, 'refs/tags/')
        with:
          # On the "Releases" page, this will show as a direct download link for the .exe
          files: electron2.1/release/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
