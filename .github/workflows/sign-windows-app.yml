name: Build and Sign Windows App

on:
  push:
    branches: [ main ]

permissions:
  id-token: write # Required for OIDC login
  contents: read

jobs:
  build-and-sign:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Or your preferred version

      - name: Install Dependencies and Build
        run: |
          npm install
          npm run build # This should produce your 'NAVFIT26 Setup 1.0.0.exe'
      - name: Download Artifact Signing Client
        shell: pwsh
        run: |
          # Download the latest version of the client tools
          nuget install Microsoft.ArtifactSigning.Client -OutputDirectory ./signing-tools -ExcludeVersion
      - name: Create Metadata File
        shell: pwsh
        run: |
          $metadata = @{
              Endpoint = "${{ vars.ARTIFACT_ENDPOINT }}"
              CodeSigningAccountName = "${{ vars.ARTIFACT_ACCOUNT_NAME }}"
              CertificateProfileName = "${{ vars.ARTIFACT_PROFILE_NAME }}"
          }
          # Convert to JSON and save as 'metadata.json'
          $metadata | ConvertTo-Json | Out-File -FilePath metadata.json -Encoding utf8
      - name: Sign Installer
        shell: pwsh
        run: |
          # 1. Find signtool.exe
          $signtool = Get-ChildItem -Path "C:\Program Files (x86)\Windows Kits\10\bin" -Filter signtool.exe -Recurse | Where-Object { $_.FullName -match 'x64' } | Select-Object -First 1 -ExpandProperty FullName
          
          # 2. Path to the DLL (Downloaded via NuGet in the previous step)
          $dlibPath = "signing-tools/Microsoft.ArtifactSigning.Client/runtimes/win-x64/native/Azure.CodeSigning.Dlib.dll"

          # 3. Path to your installer (relative to the repo root)
          $installerPath = Get-ChildItem -Path "electron2.1/release/*.exe" | Select-Object -First 1 -ExpandProperty FullName

          # 4. Sign the file
          & $signtool sign /v /debug /as /fd SHA256 `
            /tr "http://timestamp.acs.microsoft.com" /td SHA256 `
            /dlib $dlibPath `
            /dmdf "metadata.json" `
            $installerPath

      - name: Upload Signed Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Signed-Installer
          path: release/*.exe
